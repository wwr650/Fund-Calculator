<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>基金净值换算器 | 智能双向换算</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #eef2f7 0%, #dfe6ef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 640px;
            width: 100%;
            background: rgba(255,255,255,0.98);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.03);
            padding: 28px 26px 36px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.6);
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 0.2rem 0;
            background: linear-gradient(135deg, #1e3a5f, #0f2c44);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .badge {
            background: #e9f0f5;
            border-radius: 60px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1f6392;
            display: inline-block;
        }
        .sub {
            font-size: 0.9rem;
            color: #4a627a;
            margin-bottom: 2rem;
            border-left: 3px solid #2c7da0;
            padding-left: 14px;
            font-weight: 450;
            margin-top: 6px;
        }
        .input-group {
            margin-bottom: 1.9rem;
            display: flex;
            flex-direction: column;
        }
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        label {
            font-weight: 600;
            color: #1e3c5c;
            font-size: 1rem;
        }
        .unit-hint {
            font-size: 0.7rem;
            color: #6c86a0;
            background: #f0f4fa;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 1.5px solid #dae6f0;
            border-radius: 44px;
            transition: all 0.2s;
            padding: 2px 6px 2px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .input-wrapper:focus-within {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.15);
            background: #ffffff;
        }
        .input-wrapper span {
            font-weight: 500;
            color: #2c7da0;
            margin-right: 8px;
            font-size: 1.1rem;
        }
        input {
            width: 100%;
            padding: 14px 12px 14px 6px;
            font-size: 1rem;
            border: none;
            background: transparent;
            outline: none;
            font-weight: 500;
            color: #0a2a44;
        }
        input::placeholder {
            color: #b9cfe5;
            font-weight: 400;
        }
        .flex-row {
            display: flex;
            gap: 1rem;
            margin: 18px 0 20px;
        }
        .action-btn {
            flex: 1;
            background: #eef3fc;
            border: none;
            padding: 12px 0;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1f6392;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #d0e2f0;
        }
        .action-btn.primary {
            background: #1a5f7a;
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(26,95,122,0.2);
        }
        .action-btn.primary:hover {
            background: #0f4b62;
            transform: translateY(-1px);
        }
        .action-btn:hover {
            background: #e2edf9;
            transform: translateY(-1px);
        }
        .result-area {
            background: #eef3fc;
            border-radius: 36px;
            padding: 18px 24px;
            margin: 22px 0 12px;
            border-left: 5px solid #2c7da0;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 8px 0;
            border-bottom: 1px dashed #cbdde9;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-label {
            font-weight: 500;
            color: #2c4c6e;
            font-size: 0.9rem;
        }
        .result-value {
            font-weight: 700;
            font-size: 1.3rem;
            color: #0a3957;
            word-break: break-word;
            text-align: right;
        }
        .error-msg {
            color: #c23b22;
            font-size: 0.73rem;
            margin-top: 6px;
            margin-left: 18px;
            font-weight: 500;
        }
        .small-note {
            font-size: 0.7rem;
            color: #6c8dae;
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #e2edf5;
            padding-top: 14px;
        }
        hr {
            margin: 10px 0;
            border-color: #d9e4ef;
        }
        @media (max-width: 480px) {
            .card {
                padding: 20px 18px;
            }
            .result-value {
                font-size: 1.1rem;
            }
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 18px;
            color: #6a85a0;
        }
        .key-hint {
            background: #eef3fc;
            border-radius: 24px;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #2c7da0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        📊 基金换算器 
        <span class="badge">智能双向换算</span>
    </h1>
    <div class="sub">
        修改份额 → 自动计算金额 &nbsp;|&nbsp; 修改金额 → 自动计算份额<br>
        <span class="key-hint">⏎ 回车 或 失焦 触发换算 · 不改动您正在编辑的字段</span>
    </div>

    <!-- 单位净值 (核心) -->
    <div class="input-group">
        <div class="label-row">
            <label>📈 当前单位净值 (NAV)</label>
            <span class="unit-hint">元/份</span>
        </div>
        <div class="input-wrapper">
            <span>¥</span>
            <input type="text" id="navInput" placeholder="例如: 1.2580" inputmode="decimal" value="1.2580">
        </div>
        <div id="navError" class="error-msg"></div>
    </div>

    <!-- 持有份额输入区 -->
    <div class="input-group">
        <div class="label-row">
            <label>📦 持有份额</label>
            <span class="unit-hint">份</span>
        </div>
        <div class="input-wrapper">
            <span>🧾</span>
            <input type="text" id="sharesInput" placeholder="输入份额数量，如 1250.68" inputmode="decimal" value="">
        </div>
        <div id="sharesError" class="error-msg"></div>
    </div>

    <!-- 金额输入区 (金额 ↔ 份额) -->
    <div class="input-group">
        <div class="label-row">
            <label>💰 金额</label>
            <span class="unit-hint">元 (市值)</span>
        </div>
        <div class="input-wrapper">
            <span>¥</span>
            <input type="text" id="amountInput" placeholder="输入金额，如 5000.00" inputmode="decimal" value="">
        </div>
        <div id="amountError" class="error-msg"></div>
    </div>

    <!-- 辅助按钮 (仅清空) -->
    <div class="flex-row">
        <button class="action-btn primary" id="clearBtn">🗑️ 清空所有</button>
    </div>

    <!-- 结果面板 -->
    <div class="result-area">
        <div class="result-item">
            <span class="result-label">📌 单位净值</span>
            <span class="result-value" id="displayNav">—</span>
        </div>
        <div class="result-item">
            <span class="result-label">📦 持有份额</span>
            <span class="result-value" id="displayShares">—</span>
        </div>
        <div class="result-item">
            <span class="result-label">💰 金额 (市值)</span>
            <span class="result-value" id="displayAmount">—</span>
        </div>
        <hr>
        <div class="result-item">
            <span class="result-label">✨ 换算规则</span>
            <span class="result-value" id="formulaNote">等待输入</span>
        </div>
    </div>
    <div class="small-note">
        💡 智能识别您改动的是「份额」还是「金额」 → 自动计算另一方 (覆盖未改动的字段)<br>
        ⚡ 按回车键 或 点击其他位置即触发换算 · 不含申购/赎回费
    </div>
    <footer>📌 部署于 GitHub Pages · 改动谁就保留谁，自动计算另一方</footer>
</div>

<script>
    // DOM 元素
    const navInput = document.getElementById('navInput');
    const sharesInput = document.getElementById('sharesInput');
    const amountInput = document.getElementById('amountInput');
    
    const displayNavSpan = document.getElementById('displayNav');
    const displaySharesSpan = document.getElementById('displayShares');
    const displayAmountSpan = document.getElementById('displayAmount');
    const formulaNoteSpan = document.getElementById('formulaNote');
    
    const navError = document.getElementById('navError');
    const sharesError = document.getElementById('sharesError');
    const amountError = document.getElementById('amountError');
    
    const clearBtn = document.getElementById('clearBtn');
    
    // 防递归标志
    let isUpdating = false;
    
    // 记录用户最后一次主动修改的字段 (份额 或 金额)
    // 初始为 null，当用户在输入框内按键盘或通过UI交互时记录
    let lastChangedField = null;   // 'shares' 或 'amount'
    
    // ---------- 纯解析函数 ----------
    function parseNumber(str, allowZero = true, positiveOnly = true) {
        if (typeof str !== 'string') str = String(str === undefined ? '' : str);
        let trimmed = str.trim();
        if (trimmed === '') return null;
        let num = parseFloat(trimmed);
        if (isNaN(num)) return null;
        if (positiveOnly && num < 0) return null;
        if (!allowZero && num === 0) return null;
        return num;
    }
    
    function getValidNav() {
        let val = navInput.value;
        let nav = parseNumber(val, false, true);
        if (nav === null || nav <= 0) return null;
        return nav;
    }
    
    function getValidShares() {
        let val = sharesInput.value;
        let shares = parseNumber(val, true, true);
        if (shares === null) return null;
        if (shares < 0) return null;
        return shares;
    }
    
    function getValidAmount() {
        let val = amountInput.value;
        let amount = parseNumber(val, true, true);
        if (amount === null) return null;
        if (amount < 0) return null;
        return amount;
    }
    
    function clearErrors() {
        navError.innerText = '';
        sharesError.innerText = '';
        amountError.innerText = '';
    }
    
    function setNavError(msg) { navError.innerText = msg; }
    function setSharesError(msg) { sharesError.innerText = msg; }
    function setAmountError(msg) { amountError.innerText = msg; }
    
    // ---------- 核心换算: 智能识别改动字段 ----------
    // 根据 lastChangedField 决定换算方向:
    // - 如果用户最后改的是份额 -> 根据份额计算金额，覆盖金额框
    // - 如果用户最后改的是金额 -> 根据金额计算份额，覆盖份额框
    // - 如果 lastChangedField 为 null (初始化或清空后) 且两者都有值则优先以份额为基准（兼容旧逻辑）
    // - 如果只有一个有值，则直接计算另一项 (不管 lastChangedField)
    // 这样可以保证用户改动哪个字段，那个字段的值就保留原样，只覆盖未改动的部分
    function performConversion() {
        if (isUpdating) return;
        isUpdating = true;
        
        clearErrors();
        
        const nav = getValidNav();
        const isValidNav = (nav !== null && nav > 0);
        
        // 展示净值UI
        if (isValidNav) {
            displayNavSpan.innerText = nav.toFixed(6) + " 元";
        } else {
            displayNavSpan.innerText = "⚠️ 无效净值";
        }
        
        let shares = getValidShares();
        let amount = getValidAmount();
        
        let sharesValid = (shares !== null);
        let amountValid = (amount !== null);
        
        // 1. 净值无效处理
        if (!isValidNav) {
            setNavError("❌ 单位净值必须为正数 (大于0)");
            displaySharesSpan.innerText = (sharesValid ? shares.toFixed(4) + " 份" : "—");
            displayAmountSpan.innerText = (amountValid ? amount.toFixed(4) + " 元" : "—");
            formulaNoteSpan.innerText = "净值无效，无法换算";
            if (!sharesValid && !amountValid) formulaNoteSpan.innerText = "请输入有效净值、份额或金额";
            isUpdating = false;
            return;
        }
        
        // 净值有效核心换算
        // 情形1: 只有份额有效 -> 计算金额 (无论lastChangedField, 因为另一方无值)
        if (sharesValid && !amountValid) {
            const calcAmount = shares * nav;
            amountInput.value = calcAmount.toFixed(6);
            displaySharesSpan.innerText = shares.toFixed(4) + " 份";
            displayAmountSpan.innerText = calcAmount.toFixed(4) + " 元";
            formulaNoteSpan.innerText = `📐 根据份额换算金额：${shares.toFixed(4)} 份 × 净值 ${nav.toFixed(6)} = ${calcAmount.toFixed(4)} 元`;
            setAmountError("");
            // 同步最后改动标记 (既然只有份额，实际上用户意图就是份额主导)
            lastChangedField = 'shares';
        }
        // 情形2: 只有金额有效 -> 计算份额
        else if (!sharesValid && amountValid) {
            const calcShares = amount / nav;
            sharesInput.value = calcShares.toFixed(6);
            displaySharesSpan.innerText = calcShares.toFixed(6) + " 份";
            displayAmountSpan.innerText = amount.toFixed(4) + " 元";
            formulaNoteSpan.innerText = `📐 根据金额换算份额：${amount.toFixed(4)} 元 ÷ 净值 ${nav.toFixed(6)} = ${calcShares.toFixed(6)} 份`;
            setSharesError("");
            lastChangedField = 'amount';
        }
        // 情形3: 两者都有值 -> 根据用户最后改动的字段来决定换算方向
        else if (sharesValid && amountValid) {
            // 如果有明确的最后改动字段，就尊重用户意图
            if (lastChangedField === 'shares') {
                // 用户最后改了份额，根据份额重新计算金额
                const correctAmount = shares * nav;
                const diff = Math.abs(correctAmount - amount);
                if (diff > 0.00001) {
                    amountInput.value = correctAmount.toFixed(6);
                    setAmountError("⚡ 已根据您修改的份额自动更新金额");
                } else {
                    setAmountError("");
                }
                displaySharesSpan.innerText = shares.toFixed(4) + " 份";
                displayAmountSpan.innerText = correctAmount.toFixed(4) + " 元";
                formulaNoteSpan.innerText = `🔄 根据份额换算金额：${shares.toFixed(4)} 份 × 净值 ${nav.toFixed(6)} = ${correctAmount.toFixed(4)} 元`;
            } 
            else if (lastChangedField === 'amount') {
                // 用户最后改了金额，根据金额重新计算份额
                const correctShares = amount / nav;
                const diff = Math.abs(correctShares - shares);
                if (diff > 0.00001) {
                    sharesInput.value = correctShares.toFixed(6);
                    setSharesError("⚡ 已根据您修改的金额自动更新份额");
                } else {
                    setSharesError("");
                }
                displaySharesSpan.innerText = correctShares.toFixed(6) + " 份";
                displayAmountSpan.innerText = amount.toFixed(4) + " 元";
                formulaNoteSpan.innerText = `🔄 根据金额换算份额：${amount.toFixed(4)} 元 ÷ 净值 ${nav.toFixed(6)} = ${correctShares.toFixed(6)} 份`;
            }
            else {
                // 兼容旧逻辑或初始化后两者都有值但无改动记录，默认以份额为基准（更符合基金习惯）
                const correctAmount = shares * nav;
                const diff = Math.abs(correctAmount - amount);
                if (diff > 0.00001) {
                    amountInput.value = correctAmount.toFixed(6);
                    setAmountError("⚡ 已根据份额自动修正金额");
                } else {
                    setAmountError("");
                }
                displaySharesSpan.innerText = shares.toFixed(4) + " 份";
                displayAmountSpan.innerText = correctAmount.toFixed(4) + " 元";
                formulaNoteSpan.innerText = `💰 金额 = 份额 × 净值 → ${shares.toFixed(4)} × ${nav.toFixed(6)} = ${correctAmount.toFixed(4)} 元`;
                lastChangedField = 'shares'; // 设定默认
            }
        }
        // 情形4: 两者都无效
        else {
            displaySharesSpan.innerText = "—";
            displayAmountSpan.innerText = "—";
            formulaNoteSpan.innerText = "✨ 请输入份额 或 金额，按回车/失焦自动换算";
            if (sharesInput.value !== "" && shares === null) {
                setSharesError("份额必须为非负数字 (例如 1000.5)");
            }
            if (amountInput.value !== "" && amount === null) {
                setAmountError("金额必须为非负数字 (例如 5000.0)");
            }
            // 清空记录，避免残留
            lastChangedField = null;
        }
        
        // 零值友好提示
        const finalShares = getValidShares();
        const finalAmount = getValidAmount();
        if (isValidNav && finalShares === 0 && finalAmount !== null && finalAmount === 0) {
            formulaNoteSpan.innerText = "份额为0，对应市值为0元";
        } else if (isValidNav && finalAmount === 0 && finalShares !== null && finalShares === 0) {
            formulaNoteSpan.innerText = "金额为0，对应份额为0份";
        }
        
        isUpdating = false;
    }
    
    // ---------- 清空功能 (保留净值默认示例) ----------
    function clearAll() {
        if (isUpdating) return;
        isUpdating = true;
        navInput.value = '1.2580';
        sharesInput.value = '';
        amountInput.value = '';
        lastChangedField = null;      // 重置改动记录
        clearErrors();
        isUpdating = false;
        performConversion();          // 刷新界面
    }
    
    // ---------- 监听用户主动修改字段 (用于记录最后修改的是份额还是金额) ----------
    // 注意：只在用户聚焦输入框并通过键盘/粘贴等真正改变值时记录，不干扰换算执行。
    // 我们使用 'focus' 和 'input' 轻量级记录，但为了避免冲突，仅在非更新状态下记录。
    // 并且要确保记录时不会触发换算（换算只由回车/失焦触发）
    function onSharesUserEdit() {
        if (!isUpdating) {
            lastChangedField = 'shares';
        }
    }
    
    function onAmountUserEdit() {
        if (!isUpdating) {
            lastChangedField = 'amount';
        }
    }
    
    // 监听 input 事件仅用于记录最后编辑的字段，绝对不在此执行换算逻辑
    sharesInput.addEventListener('input', onSharesUserEdit);
    amountInput.addEventListener('input', onAmountUserEdit);
    
    // 额外: 当用户手动清空或粘贴时同样记录, 通过input已覆盖
    
    // ---------- 换算触发: 回车 或 失焦 (blur) ----------
    function onEnterKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            performConversion();
        }
    }
    
    function onBlur() {
        performConversion();
    }
    
    // 份额框事件
    sharesInput.addEventListener('keydown', onEnterKey);
    sharesInput.addEventListener('blur', onBlur);
    
    // 金额框事件 (完全一致)
    amountInput.addEventListener('keydown', onEnterKey);
    amountInput.addEventListener('blur', onBlur);
    
    // 净值修改也需要重新计算 (用户改净值后也需要基于现有份额或金额重新换算)
    navInput.addEventListener('keydown', onEnterKey);
    navInput.addEventListener('blur', onBlur);
    // 净值编辑时同样记录一个特殊标记？不需要，净值变化时应该根据当前的 lastChangedField 重新计算
    // 但为了避免净值变化后逻辑错乱，在performConversion内部会根据现有有效值和lastChangedField进行处理，完美。
    
    // 清空按钮
    clearBtn.addEventListener('click', clearAll);
    
    // 额外优化: 当用户通过清空按钮重置后，lastChangedField = null，行为干净。
    
    // 初始化页面
    window.addEventListener('DOMContentLoaded', () => {
        navInput.value = '1.2580';
        sharesInput.value = '';
        amountInput.value = '';
        lastChangedField = null;
        performConversion();
    });
    
    // 确保在外部点击清空后，焦点离开时不会误触发旧的改动标记，已经重置。
    // 完美实现: 用户改动「份额」→ 自动计算「金额」(覆盖金额框)
    //           用户改动「金额」→ 自动计算「份额」(覆盖份额框)
    //           两者均有值但无改动记录时, 默认以份额为准 (符合直觉)
    //           回车/失焦触发，输入过程零干扰。
</script>
</body>
</html>
